<DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8">
        <title>Junior Frontend - Randomizált 50 kérdéses teszt</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Junior Frontend - Randomizált 50 kérdéses teszt</h1>
        <p>Nyomd meg a „Kérdéssor keverése” gombot egy új sorrendű tesztért, majd válaszolj, és ellenőrizd az eredményt.</p>

        <div class="controls">
            <button id="shuffleBtn">Kérdéssor keverése</button>
            <button id="checkBtn">Ellenőrzés</button>
        </div>

        <div id="quiz" style="margin-top:20px;"></div>

        <div id="result" class="result" style="display:none;"></div>

        <script src="script.js"></script>
    </body>
</html>
